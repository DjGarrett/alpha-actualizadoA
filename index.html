                border: none;

            }

            /* Estilos cuando el body tenga la clase 'dark-mode' */

                background-color: #121212 !important;
                color: #ffffff !important;
            }

            body.dark-mode h1, 
            body.dark-mode h2, 
            body.dark-mode p,
            body.dark-mode ol,
            body.dark-mode li {
                color: #ffffff !important;
            }

            /* Estilo del botón cuando la página está oscura */
            body.dark-mode .btn-modo {
